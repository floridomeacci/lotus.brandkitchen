    <style>
      .vg-content {
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .vg-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        gap: 20px;
        margin-bottom: 18px;
      }

      .vg-head p {
        margin: 0;
        color: var(--yellow);
        font-weight: 600;
        font-size: 13px;
      }

      .vg-head h1 {
        margin: 8px 0 0;
        font-size: clamp(28px, 3.4vw, 40px);
        letter-spacing: 0.06em;
        font-weight: 500;
      }

      .vg-shell {
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 14px;
        background: var(--card);
        display: grid;
        grid-template-columns: 340px 1fr;
        gap: 16px;
        min-height: 0;
        flex: 1;
        overflow: auto;
        padding: 16px;
      }

      .panel-title {
        margin: 0 0 10px;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.05em;
        color: var(--text);
      }

      .prompt-col {
        align-self: start;
        position: sticky;
        top: 0;
      }

      .prompt-card,
      .output-card {
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: var(--bg);
        border-radius: 12px;
      }

      .prompt-body {
        padding: 12px;
        display: grid;
        gap: 10px;
      }

      .prompt-body label {
        display: grid;
        gap: 5px;
        font-size: 11px;
        color: var(--card-text);
      }

      .prompt-body input,
      .prompt-body select,
      .prompt-body textarea {
        background: rgba(0,0,0,.2);
        border: 1px solid rgba(255, 255, 255, 0.11);
        border-radius: 8px;
        color: var(--text);
        font-size: 12px;
        padding: 8px 9px;
        font-family: inherit;
        transition: border-color .2s;
      }
      .prompt-body input:hover,
      .prompt-body select:hover,
      .prompt-body textarea:hover {
        border-color: rgba(255, 255, 255, 0.2);
      }
      .prompt-body input:focus,
      .prompt-body select:focus,
      .prompt-body textarea:focus {
        border-color: rgba(255, 242, 0, 0.4);
        outline: none;
      }

      .prompt-body textarea {
        min-height: 86px;
        resize: vertical;
      }

      .generate-btn {
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: var(--panel);
        color: var(--text);
        border-radius: 999px;
        font-size: 12px;
        padding: 8px 12px;
        cursor: pointer;
        transition: border-color .2s, background .2s;
      }
      .generate-btn:hover {
        border-color: rgba(255, 255, 255, 0.3);
        background: var(--card);
      }

      .output-col {
        min-width: 0;
      }

      .output-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }

      .variant-chip {
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 999px;
        color: var(--card-text);
        font-size: 10px;
        padding: 5px 9px;
      }

      .output-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(220px, 1fr));
        gap: 12px;
      }

      .output-card {
        overflow: hidden;
      }

      .out-img {
        width: 100%;
        aspect-ratio: 16 / 9;
        background: var(--bg);
      }

      .out-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .out-meta {
        padding: 10px;
      }

      .out-meta h3 {
        margin: 0;
        font-size: 13px;
        color: var(--text);
      }

      .out-meta p {
        margin: 4px 0 0;
        font-size: 11px;
        color: var(--card-text);
      }

      .out-actions {
        padding: 0 10px 10px;
        display: flex;
        gap: 6px;
      }

      .btn-bannerset {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 11px;
        font-weight: 600;
        font-family: inherit;
        padding: 6px 12px;
        border-radius: 6px;
        border: 1px solid rgba(255, 242, 0, 0.3);
        background: rgba(255, 242, 0, 0.08);
        color: var(--yellow);
        cursor: pointer;
        transition: background 0.2s, border-color 0.2s;
      }
      .btn-bannerset:hover {
        background: rgba(255, 242, 0, 0.15);
        border-color: rgba(255, 242, 0, 0.5);
      }

      .active-app {
        color: #f3f5fb;
        font-weight: 600;
      }

      .active-app .ico {
        color: var(--yellow);
      }

      @media (max-width: 1240px) {
        .vg-shell {
          grid-template-columns: 300px 1fr;
        }
      }

      @media (max-width: 900px) {
        .output-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 760px) {
        .vg-content {
          height: auto;
          overflow: visible;
          padding: 26px 18px 24px;
        }

        .vg-head {
          flex-direction: column;
          align-items: flex-start;
        }

        .vg-shell {
          grid-template-columns: 1fr;
        }

        .prompt-col {
          position: static;
        }
      }
    </style>

    <script>
      const outputGrid = document.getElementById('outputGrid');
      const variantInfo = document.getElementById('variantInfo');
      const vgForm = document.getElementById('vgForm');
      const generateBtn = vgForm.querySelector('.generate-btn');

      function escapeHTML(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
      }

      /* Show placeholder skeleton cards while generating */
      function renderPlaceholders(count, meta) {
        outputGrid.innerHTML = '';
        for (let i = 0; i < count; i++) {
          const card = document.createElement('article');
          card.className = 'output-card';
          card.innerHTML = `
            <div class="out-img" style="display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px;">
              <span><i class="bi bi-hourglass-split" style="font-size:24px;display:block;margin-bottom:8px;text-align:center"></i>Generating…</span>
            </div>
            <div class="out-meta">
              <h3>Variant ${i + 1}</h3>
              <p>${escapeHTML(meta.style)} · ${escapeHTML(meta.market)}</p>
            </div>
          `;
          outputGrid.appendChild(card);
        }
        variantInfo.textContent = `Generating ${count} image${count > 1 ? 's' : ''}…`;
      }

      /* Render generated image cards */
      function renderImages(images, meta) {
        outputGrid.innerHTML = '';
        /* Proxy external URLs through our backend for CORS compatibility */
        const proxied = images.map(src =>
          src.startsWith('https://replicate.delivery/') ? '/api/proxy-image?url=' + encodeURIComponent(src) : src
        );
        proxied.forEach((src, idx) => {
          const card = document.createElement('article');
          card.className = 'output-card';
          card.innerHTML = `
            <div class="out-img"><img src="${src}" alt="Generated image ${idx + 1}" /></div>
            <div class="out-meta">
              <h3>Variant ${idx + 1}</h3>
              <p>${escapeHTML(meta.style)} · ${escapeHTML(meta.market)} · ${escapeHTML(meta.objective)}</p>
            </div>
            <div class="out-actions">
              <button class="btn-bannerset" data-src="${src}"><i class="bi bi-grid-3x3-gap"></i>Use in Bannerset</button>
            </div>
          `;
          outputGrid.appendChild(card);
        });

        /* Attach bannerset handoff listeners */
        outputGrid.querySelectorAll('.btn-bannerset').forEach(btn => {
          btn.addEventListener('click', () => {
            sessionStorage.setItem('vg-hero-image', btn.dataset.src);
            window.location.href = './iab-bannerset.html';
          });
        });

        variantInfo.textContent = `${proxied.length} generated image${proxied.length !== 1 ? 's' : ''}`;
      }

      /* Generate images via Seedream 4 */
      async function generateImages(prompt, count, meta) {
        const results = [];

        /* Fire all requests in parallel (1 image each) */
        const requests = Array.from({ length: count }, () =>
          fetch('/api/image', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt, aspect_ratio: '4:3', max_images: 1 })
          }).then(r => {
            if (!r.ok) throw new Error('Image generation failed');
            return r.json();
          })
        );

        const responses = await Promise.allSettled(requests);
        responses.forEach(r => {
          if (r.status === 'fulfilled' && r.value.images?.length) {
            results.push(...r.value.images);
          }
        });

        return results;
      }

      vgForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        const formData = new FormData(vgForm);
        const meta = {
          objective: String(formData.get('objective') || 'Campaign concept'),
          market: String(formData.get('market') || 'Pan-Europe'),
          style: String(formData.get('style') || 'Cinematic premium'),
          prompt: String(formData.get('prompt') || ''),
        };

        const imageCount = 4;

        generateBtn.disabled = true;
        generateBtn.textContent = 'Generating…';
        renderPlaceholders(imageCount, meta);

        try {
          const images = await generateImages(meta.prompt, imageCount, meta);

          if (images.length > 0) {
            renderImages(images, meta);
          } else {
            variantInfo.textContent = 'Generation failed — try again';
          }
        } catch (err) {
          console.error('Visual Generator error:', err);
          variantInfo.textContent = 'Generation failed — try again';
        } finally {
          generateBtn.disabled = false;
          generateBtn.textContent = 'Generate images';
        }
      });

      /* Initial static state */
      variantInfo.textContent = 'Enter a prompt and generate';

      document.querySelectorAll('.app-nav-item[data-href]').forEach((item) => {
        const go = () => {
          const href = item.getAttribute('data-href');
          if (href) window.location.href = href;
        };

        item.addEventListener('click', go);
        item.addEventListener('keydown', (event) => {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            go();
          }
        });
      });
    </script>

      };

      var overlay = document.getElementById('spOverlay');
      var panel = document.getElementById('sidePanel');
      var spTitle = document.getElementById('spTitle');
      var spBody = document.getElementById('spBody');
      var spClose = document.getElementById('spClose');

      function openPanel(key) {
        var p = panels[key];
        if (!p) return;
        spTitle.textContent = p.title;
        spBody.innerHTML = p.html;
        overlay.classList.add('open');
        panel.classList.add('open');
      }
      function closePanel() {
        overlay.classList.remove('open');
        panel.classList.remove('open');
      }
      overlay.addEventListener('click', closePanel);
      spClose.addEventListener('click', closePanel);
      document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closePanel(); });

      document.querySelectorAll('[data-panel]').forEach(function(el) {
        el.addEventListener('click', function() { openPanel(el.getAttribute('data-panel')); });
      });
    })();
    </script>
  </body>
</html>
